<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | KSU RIT Unit</title>
    <link rel="stylesheet" href="/src/css/main.css">
    <link rel="stylesheet" href="/src/css/layout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="loading">
    <div id="app">
        <header id="navbar-placeholder"></header>
        
        <main>
            <section class="page-hero">
                <div class="container">
                    <h1>Gallery</h1>
                    <p>A visual journey through our programs and campus life.</p>
                </div>
            </section>

            <section class="container gallery-section">
                <div class="gallery-masonry">
                    <!-- Gallery Item 1 -->
                    <div class="gallery-item">
                        <img src="https://picsum.photos/400/600?random=1" alt="Event Image 1">
                    </div>

                    <!-- Gallery Item 2 -->
                    <div class="gallery-item">
                        <img src="https://picsum.photos/400/300?random=2" alt="Event Image 2">
                    </div>

                    <!-- Gallery Item 3 -->
                    <div class="gallery-item">
                        <img src="https://picsum.photos/400/500?random=3" alt="Event Image 3">
                    </div>

                    <!-- Gallery Item 4 -->
                    <div class="gallery-item">
                        <img src="https://picsum.photos/400/400?random=4" alt="Event Image 4">
                    </div>

                    <!-- Gallery Item 5 -->
                    <div class="gallery-item">
                        <img src="https://picsum.photos/400/700?random=5" alt="Event Image 5">
                    </div>

                    <!-- Gallery Item 6 -->
                    <div class="gallery-item">
                        <img src="https://picsum.photos/400/350?random=6" alt="Event Image 6">
                    </div>

                    <!-- Gallery Item 7 -->
                    <div class="gallery-item">
                        <img src="https://picsum.photos/400/450?random=7" alt="Event Image 7">
                    </div>

                    <!-- Gallery Item 8 -->
                    <div class="gallery-item">
                        <img src="https://picsum.photos/400/550?random=8" alt="Event Image 8">
                    </div>
                </div>
            </section>
        </main>

        <footer id="footer-placeholder"></footer>
    </div>
    <script type="module" src="/src/js/main.js"></script>
</body>
</html>
